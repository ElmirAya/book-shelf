<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Shelf</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1> Book Shelf</h1>
        </header>

<section class="search-section">
    <input type="text" id="searchInput" placeholder="Search books...">
</section>

<section class="add-book">

<h2>Add a Book</h2>

<input type="text" id="title" placeholder="Book Title">

<input type="text" id="author" placeholder="Author Name">

<textarea id="summary" placeholder="Short Summary (2-3 lines)"></textarea>

<input type="date" id="publicationDate">

<input type="date" id="writtenDate">

<input type="url" id="documentLink" placeholder="Document Link (URL or PDF)">

<button id="addBookBtn">Add Book</button>

</section>

<section class="book-counter">
    <p>Total Books: <span id="totalBooks">0</span></p>
</section>

<section class="books">
    <h2>My Books</h2>
    <div id="bookList">
    </div>
</section>

<script src="scripts.js"></script>

</body>
</html>
